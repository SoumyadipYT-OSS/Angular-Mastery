<div class="profile-card">
  <div class="avatar">
    <img src="https://imgcdn.stablediffusionweb.com/2024/11/28/9e436269-6469-4b63-b335-b05874a44de1.jpg" alt="User Avatar">
  </div>
  
  <div class="info">
    <h2>{{ name() }}</h2>
    <p class="role">{{ jobTitle() }}</p>
    
    <div class="status-badge" [class.online]="isOnline()">
      {{ isOnline() ? 'Available' : 'Busy' }}
    </div>
  </div>

  <button (click)="toggleStatus()" class="action-btn">
    Update Status
  </button>
</div>
